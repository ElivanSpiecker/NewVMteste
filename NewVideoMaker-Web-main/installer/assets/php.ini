; php.ini para o PHP embarcado distribuido com o NEW VideoMaker.
; Mantemos apenas o essencial pro Laravel + os jobs de upload/HTTP.

[PHP]
engine = On
short_open_tag = Off
precision = 14
output_buffering = Off
zlib.output_compression = Off
implicit_flush = Off
serialize_precision = -1
disable_functions =
disable_classes =
zend.enable_gc = On
zend.exception_ignore_args = Off
zend.exception_string_param_max_len = 15

expose_php = Off
max_execution_time = 0
max_input_time = 600
memory_limit = 512M
post_max_size = 512M
upload_max_filesize = 512M
max_file_uploads = 50
default_charset = "UTF-8"
default_mimetype = "text/html"

error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
display_errors = Off
display_startup_errors = Off
log_errors = On
ignore_repeated_errors = Off
ignore_repeated_source = Off
report_memleaks = On
variables_order = "GPCS"
request_order = "GP"
register_argc_argv = Off
auto_globals_jit = On
file_uploads = On

; Caminho relativo ao executavel — o launcher passa -d extension_dir
extension_dir = "ext"

extension=curl
extension=fileinfo
extension=gd
extension=intl
extension=mbstring
extension=openssl
extension=pdo_sqlite
extension=sqlite3
extension=sodium
extension=exif
extension=zip

[CLI Server]
cli_server.color = Off

[Date]
date.timezone = America/Sao_Paulo

[opcache]
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 10000
opcache.revalidate_freq = 0
opcache.validate_timestamps = 1
